version: '3.8'
# Имя проекта
name: hw4_docker
# Описание сервисов (контейнеров)
services:
  # Основной веб-сервис на FastAPI
  hw4_docker:
    # Сборка образа из Dockerfile в текущем контексте
    build:
      context: .                 # Корень сборки (где лежит Dockerfile)
      dockerfile: ./Dockerfile   # Явное указание файла Dockerfile
    # Имя контейнера 
    container_name: hw4_docker
    # Политика перезапуска: always - всегда перезапускать при падении или перезагрузке хоста
    restart: always
    # Проброс портов: хост:контейнер (доступ к API снаружи)
    ports:
      - "8000:8000"
    # Тома: папка data на хосте монтируется в /app/data внутри контейнера
    # Это позволяет сохранять данные (логи, датасеты) после остановки контейнера
    volumes:
      - ./data:/app/data
    # Изолированная внутренняя сеть (без доступа извне)
    networks:
      - internal
    # Проверка работоспособности сервиса (healthcheck)
    healthcheck:
      # Команда проверки: curl запрашивает эндпоинт /items (должен вернуть HTTP 200)
      test: ["CMD", "curl", "-f", "http://localhost:8000/items"]
      interval: 30s      # Как часто выполнять проверку
      timeout: 5s        # Таймаут ожидания ответа
      retries: 3         # Количество попыток до признания сервиса unhealthy
      start_period: 40s  # Время ожидания после запуска перед началом проверок
    # Ограничения ресурсов (CPU, память) 
    deploy:
      resources:
        limits:
          cpus: '0.5'        # Максимум 0.5 ядра CPU
          memory: 256M       # Максимум 256 МБ оперативной памяти
        reservations:
          cpus: '0.2'        # Гарантированно 0.2 ядра
          memory: 128M       # Гарантированно 128 МБ
    # Профили запуска: prod и dev – позволяют выборочно запускать сервисы
    profiles:
      - prod
      - dev
# Определение сетей
networks:
  # Внутренняя сеть (internal: true) – изолирована, доступ к ней есть только у сервисов,
  # подключённых к этой сети. Это повышает безопасность.
  internal:
    driver: bridge
    internal: true